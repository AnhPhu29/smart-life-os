name: Backend - Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: smart_life_test
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup environment
        working-directory: ./backend
        run: |
          echo "DATABASE_URL=mysql://root:test123@localhost:3306/smart_life_test" > .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npm run prisma:generate

      - name: Push database schema
        working-directory: ./backend
        run: npm run prisma:push

      - name: Build TypeScript
        working-directory: ./backend
        run: npm run build

      - name: Run tests (if any)
        working-directory: ./backend
        run: npm test 2>/dev/null || echo "No tests configured yet"

      - name: Check for TypeScript errors
        working-directory: ./backend
        run: npx tsc --noEmit

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

      - name: Check for vulnerable dependencies
        working-directory: ./backend
        run: npx snyk test --severity-threshold=high 2>/dev/null || echo "Snyk scan skipped (token not configured)"
