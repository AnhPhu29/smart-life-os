name: Frontend - Build, Test & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Test (chạy mọi push/PR)
  # ─────────────────────────────────────────
  build-test:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: '**/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Setup environment
        working-directory: ./frontend
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080/api/v1' }}" > .env.local

      - name: Lint code
        working-directory: ./frontend
        run: npx next lint 2>/dev/null || echo "⚠️ No linting configured, skipping..."

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────
  # JOB 2: Security Scan (độc lập)
  # ─────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Vercel (chỉ push vào main)
  # ─────────────────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-test # Chỉ deploy nếu build-test PASS
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd frontend
          vercel deploy --prod --token=$VERCEL_TOKEN > deploy-url.txt
          url=$(cat deploy-url.txt)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $url"

      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to Vercel completed successfully!"
            echo "Production URL: https://${{ steps.deploy.outputs.url }}"
          else
            echo "❌ Deployment failed!"
          fi
